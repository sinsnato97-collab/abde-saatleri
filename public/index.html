<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Shorts Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090f;--surface:#0f0f18;--card:#141420;--border:#1e1e30;
  --accent:#ff2d55;--accent2:#ff9f0a;--gold:#ffd700;--silver:#c0c0c0;
  --bronze:#cd7f32;--text:#f0f0f5;--muted:#55556a;--green:#30d158;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,45,85,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,45,85,.025) 1px,transparent 1px);background-size:48px 48px;z-index:0;pointer-events:none}

.app{display:flex;min-height:100vh;position:relative;z-index:1}
.left{flex:0 0 75%;padding:28px 24px 40px 32px;border-right:1px solid var(--border);overflow-y:auto}
.right{flex:0 0 25%;min-width:280px;padding:28px 20px 40px;overflow-y:auto;background:var(--surface)}

/* HEADER */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-header h1{font-size:18px;font-weight:700;color:var(--text)}
.page-header span{font-size:13px;color:var(--muted);margin-left:4px}

/* CLOCKS */
.clock-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.clock-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px;transition:all .3s}
.clock-card.active{border-color:var(--green);background:rgba(48,209,88,.08)}
.clock-card.india{border-color:#ff6b35;background:rgba(255,107,53,.06)}
.clock-card.india.active,.clock-card.phil.active{border-color:#ff2d55;background:rgba(255,45,85,.1)}
.clock-card.phil{border-color:#0a84ff;background:rgba(10,132,255,.06)}
.zone-label{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:6px}
.clock-time{font-size:48px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text)}
.clock-card.active .clock-time{color:var(--green)}
.clock-card.india.active .clock-time,.clock-card.phil.active .clock-time{color:#ff6b8a}
.clock-state{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--text);margin-top:10px}
.clock-date{font-size:12px;color:var(--muted);margin-top:3px}
.clock-pop{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.active-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(48,209,88,.15);color:var(--green);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-top:8px;text-transform:uppercase}
.active-badge.hot{background:rgba(255,45,85,.15);color:#ff6b8a}
.extra-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* LEADERBOARD */
.lb-header{margin-bottom:16px}
.lb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(135deg,#ff2d55,#ff9f0a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.lb-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.pulse{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(48,209,88,.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(48,209,88,0)}}
.next-update{margin-left:auto;font-size:10px;color:var(--muted)}

/* countdown */
.countdown-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
.countdown-fill-wrap{flex:1;margin:0 10px;background:var(--border);border-radius:99px;height:3px;overflow:hidden}
.countdown-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s linear}

.ch-pill{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:99px;padding:3px 10px;font-size:10px;color:var(--muted);margin-bottom:12px}

/* Rank cards */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;transition:all .25s;animation:slideIn .35s ease both;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,45,85,.04),transparent);opacity:0;transition:opacity .2s}
.rank-card:hover::before{opacity:1}
.rank-card:hover{border-color:rgba(255,45,85,.25);transform:translateX(3px)}
.rank-card.top1{border-color:rgba(255,215,0,.25);background:linear-gradient(135deg,#141420,#17160e)}
.rank-card.top2{border-color:rgba(192,192,192,.15)}
.rank-card.top3{border-color:rgba(205,127,50,.15)}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:24px;text-align:center;line-height:1;color:var(--muted)}
.rank-card.top1 .rank-num{color:var(--gold)}
.rank-card.top2 .rank-num{color:var(--silver)}
.rank-card.top3 .rank-num{color:var(--bronze)}
.thumb{width:56px;height:32px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--border)}
.thumb-placeholder{width:56px;height:32px;border-radius:5px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted)}
.rank-info{flex:1;min-width:0}
.rank-title{font-size:11px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.rank-channel{font-size:10px;color:var(--muted)}
.rank-stats{flex-shrink:0;text-align:right}
.rank-views{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.5px;line-height:1}
.rank-card.top1 .rank-views{color:var(--gold)}
.rank-views-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rank-ago{font-size:9px;color:var(--muted);margin-top:2px}

.skeleton{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:.9}}
.sk-n{width:24px;height:18px;background:var(--border);border-radius:3px}
.sk-t{width:56px;height:32px;background:var(--border);border-radius:5px;flex-shrink:0}
.sk-i{flex:1}.sk-l{height:10px;background:var(--border);border-radius:3px;margin-bottom:5px}
.sk-l.s{width:50%}.sk-st{width:40px}
.sk-b{height:16px;background:var(--border);border-radius:3px;margin-bottom:4px}
.sk-sm{height:8px;width:24px;background:var(--border);border-radius:3px}

.empty{text-align:center;padding:40px 10px;color:var(--muted);display:none}
.empty.visible{display:block}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:6px;color:var(--text)}

.error-banner{background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.3);border-radius:8px;padding:10px 12px;font-size:11px;color:#ff6b8a;margin-bottom:12px;display:none}
.error-banner.visible{display:block}

footer{margin-top:16px;font-size:10px;color:var(--muted);text-align:center}

@media(max-width:900px){.app{flex-direction:column}.left{flex:none;width:100%;border-right:none;border-bottom:1px solid var(--border)}.right{flex:none;width:100%}.clock-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.clock-grid{grid-template-columns:1fr 1fr}.clock-time{font-size:32px}}
</style>
</head>
<body>
<div class="app">

  <!-- LEFT: CLOCKS -->
  <div class="left">
    <div class="page-header">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#ff2d55"/>
        <circle cx="14" cy="14" r="8" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M14 10v4l2.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>YouTube Kitle Saat Analizi</h1>
        <span>Prime time = 16:00–23:00</span>
      </div>
    </div>
    <div class="clock-grid" id="usClocks"></div>
    <div class="extra-row" id="extraClocks"></div>
  </div>

  <!-- RIGHT: LEADERBOARD -->
  <div class="right">
    <div class="lb-header">
      <div class="lb-title">SHORTS<br>LEADERBOARD</div>
      <div class="lb-meta">
        <div class="pulse"></div>
        <span id="statusText">Yükleniyor...</span>
        <span class="next-update" id="nextUpdate"></span>
      </div>
    </div>

    <div class="countdown-bar">
      <span style="font-size:10px">Sonraki güncelleme:</span>
      <div class="countdown-fill-wrap"><div class="countdown-fill" id="cFill" style="width:100%"></div></div>
      <span id="cTimer" style="font-size:10px;min-width:36px;text-align:right">30:00</span>
    </div>

    <div class="error-banner" id="errorBanner"></div>
    <div class="ch-pill">📡 73 kanal</div>

    <div id="skeletonList"></div>
    <div class="rank-list" id="leaderboard"></div>
    <div class="empty" id="emptyState">
      <div class="empty-icon">📭</div>
      <h3>Short Yok</h3>
      <p>Son 24 saatte short bulunamadı.</p>
    </div>

    <footer>Son 24 saat • Otomatik güncellenir</footer>
  </div>
</div>

<script>
/* ══ CLOCKS ══ */
const US_ZONES=[
  {label:"Doğu Saat Dilimi",state:"New York",pop:"19.9M",tz:"America/New_York"},
  {label:"Merkez Saat Dilimi",state:"Illinois",pop:"12.6M",tz:"America/Chicago"},
  {label:"Dağ Saat Dilimi",state:"Arizona",pop:"7.6M",tz:"America/Phoenix"},
  {label:"Pasifik Saat Dilimi",state:"California",pop:"39.4M",tz:"America/Los_Angeles"},
  {label:"Alaska Saat Dilimi",state:"Alaska",pop:"733K",tz:"America/Anchorage"},
  {label:"Hawaii Saat Dilimi",state:"Hawaii",pop:"1.45M",tz:"Pacific/Honolulu"},
];
const EXTRA_ZONES=[
  {label:"Hindistan Saat Dilimi",state:"Hindistan",pop:"1.43B",tz:"Asia/Kolkata",cls:"india"},
  {label:"Filipinler Saat Dilimi",state:"Filipinler",pop:"114M",tz:"Asia/Manila",cls:"phil"},
];

function fmtTime(d,tz){return new Intl.DateTimeFormat("tr-TR",{timeZone:tz,hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(d)}
function fmtDate(d,tz){return new Intl.DateTimeFormat("tr-TR",{timeZone:tz,weekday:"long",month:"long",day:"numeric",year:"numeric"}).format(d)}
function getHour(d,tz){return parseInt(new Intl.DateTimeFormat("tr-TR",{timeZone:tz,hour:"2-digit",hour12:false}).format(d))}
function isPrime(d,tz){const h=getHour(d,tz);return h>=16&&h<=23}

function buildCard(z,d){
  const active=isPrime(d,z.tz);
  const key=z.tz.replace(/\//g,"-");
  return`<div class="clock-card${active?" active":""}${z.cls?" "+z.cls:""}">
    <div class="zone-label">${z.label}</div>
    <div class="clock-time" id="ct-${key}">${fmtTime(d,z.tz)}</div>
    <div class="clock-state">📍 ${z.state}</div>
    <div class="clock-date" id="cd-${key}">${fmtDate(d,z.tz)}</div>
    <div class="clock-pop">👥 Nüfus: ${z.pop}</div>
    ${active?`<div class="active-badge${z.cls?" hot":""}">● Prime Time</div>`:""}
  </div>`;
}

function renderClocks(){
  const d=new Date();
  document.getElementById("usClocks").innerHTML=US_ZONES.map(z=>buildCard(z,d)).join("");
  document.getElementById("extraClocks").innerHTML=EXTRA_ZONES.map(z=>buildCard(z,d)).join("");
}

function tickClocks(){
  const d=new Date();
  [...US_ZONES,...EXTRA_ZONES].forEach(z=>{
    const key=z.tz.replace(/\//g,"-");
    const te=document.getElementById("ct-"+key);
    const de=document.getElementById("cd-"+key);
    if(te)te.textContent=fmtTime(d,z.tz);
    if(de)de.textContent=fmtDate(d,z.tz);
    const card=te?.closest(".clock-card");
    if(card){
      const a=isPrime(d,z.tz);
      card.classList.toggle("active",a);
      let badge=card.querySelector(".active-badge");
      if(a&&!badge){badge=document.createElement("div");badge.className="active-badge"+(z.cls?" hot":"");badge.textContent="● Prime Time";card.appendChild(badge);}
      else if(!a&&badge)badge.remove();
    }
  });
}

renderClocks();
setInterval(tickClocks,1000);

/* ══ LEADERBOARD ══ */
const REFRESH_MS = 30*60*1000; // 30 minutes
let nextRefreshAt = Date.now() + REFRESH_MS;
let countdownTimer = null;

function fmt(n){n=parseInt(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n+""}
function ago(d){if(!d)return"";const h=(Date.now()-new Date(d))/3600000;return h<1?Math.round(h*60)+"dk önce":Math.round(h)+"sa önce"}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function setStatus(t){document.getElementById("statusText").textContent=t}
function showError(m){const e=document.getElementById("errorBanner");e.innerHTML=m;e.classList.add("visible")}
function hideError(){document.getElementById("errorBanner").classList.remove("visible")}
function showSkels(){document.getElementById("skeletonList").innerHTML=Array(5).fill(0).map(()=>`<div class="skeleton"><div class="sk-n"></div><div class="sk-t"></div><div class="sk-i"><div class="sk-l"></div><div class="sk-l s"></div></div><div class="sk-st"><div class="sk-b"></div><div class="sk-sm"></div></div></div>`).join("")}
function hideSkels(){document.getElementById("skeletonList").innerHTML=""}

function startCountdown(){
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + REFRESH_MS;
  countdownTimer = setInterval(()=>{
    const rem = Math.max(0, nextRefreshAt - Date.now());
    const m = Math.floor(rem/60000);
    const s = Math.floor((rem%60000)/1000);
    document.getElementById("cTimer").textContent = `${m}:${s.toString().padStart(2,"0")}`;
    document.getElementById("cFill").style.width = (rem/REFRESH_MS*100)+"%";
    if(rem<=0){ clearInterval(countdownTimer); loadLeaderboard(); }
  },1000);
}

async function loadLeaderboard(){
  hideError();
  document.getElementById("leaderboard").innerHTML="";
  document.getElementById("emptyState").classList.remove("visible");
  showSkels();
  setStatus("Güncelleniyor...");

  try{
    const r = await fetch("/api/shorts");
    if(!r.ok) throw new Error("Sunucu hatası: "+r.status);
    const data = await r.json();
    if(data.error) throw new Error(data.error);

    hideSkels();
    const items = data.items||[];
    setStatus(`✓ ${items.length} short`);
    document.getElementById("nextUpdate").textContent = new Date(data.updatedAt).toLocaleTimeString("tr-TR");

    if(!items.length){
      document.getElementById("emptyState").classList.add("visible");
    } else {
      renderLeaderboard(items);
    }
  }catch(e){
    hideSkels();
    showError("Hata: "+e.message);
    setStatus("Hata");
  }

  startCountdown();
}

function renderLeaderboard(items){
  const rc=["top1","top2","top3"];
  document.getElementById("leaderboard").innerHTML=items.map((v,i)=>`
    <a class="rank-card ${rc[i]||""}" href="https://youtube.com/shorts/${v.videoId}" target="_blank" style="animation-delay:${i*50}ms">
      <div class="rank-num">${i+1}</div>
      ${v.thumbnail?`<img class="thumb" src="${esc(v.thumbnail)}" loading="lazy" onerror="this.outerHTML='<div class=thumb-placeholder>▶</div>'">`:`<div class="thumb-placeholder">▶</div>`}
      <div class="rank-info">
        <div class="rank-title">${esc(v.title)}</div>
        <div class="rank-channel">${esc(v.channel)}</div>
      </div>
      <div class="rank-stats">
        <div class="rank-views">${fmt(v.views)}</div>
        <div class="rank-views-lbl">izlenme</div>
        ${v.publishedAt?`<div class="rank-ago">${ago(v.publishedAt)}</div>`:""}
      </div>
    </a>`).join("");
}

window.onload=()=>loadLeaderboard();
</script>
</body>
</html>
