<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Shorts Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #1e1e2e;
    --accent: #ff2d55; --accent2: #ff9f0a; --gold: #ffd700; --silver: #c0c0c0;
    --bronze: #cd7f32; --text: #f0f0f5; --muted: #666680; --green: #30d158;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,45,85,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,45,85,0.03) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0; pointer-events: none;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 48px; }
  .logo-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 8vw, 72px); letter-spacing: 3px;
    background: linear-gradient(135deg, #ff2d55 0%, #ff9f0a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
  }
  .subtitle { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 20px; font-size: 13px;
  }
  .status-left { display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(48,209,88,.4)} 50%{opacity:.8;box-shadow:0 0 0 6px rgba(48,209,88,0)} }
  .refresh-btn {
    background: var(--accent); border: none; color: white; padding: 8px 18px;
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 12px;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: #e0284d; transform: translateY(-1px); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .refresh-btn .spinner { width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none; }
  .refresh-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.3);border-radius:10px;padding:14px 18px;font-size:13px;color:#ff6b8a;margin-bottom:24px;display:none; }
  .error-msg.visible { display: block; }
  .progress-wrap { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 24px;margin-bottom:20px;display:none; }
  .progress-wrap.visible { display: block; }
  .progress-label { font-size:12px;color:var(--muted);margin-bottom:10px; }
  .progress-bar-bg { background:var(--border);border-radius:99px;height:5px;overflow:hidden; }
  .progress-bar-fill { height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .4s ease; }
  .leaderboard { display: flex; flex-direction: column; gap: 10px; }
  .rank-card {
    background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;
    display:flex;align-items:center;gap:16px;transition:all .3s;animation:slideIn .4s ease both;
    text-decoration:none;color:inherit;cursor:pointer;position:relative;overflow:hidden;
  }
  .rank-card::before { content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,45,85,.05),transparent);opacity:0;transition:opacity .3s; }
  .rank-card:hover::before { opacity:1; }
  .rank-card:hover { border-color:rgba(255,45,85,.3);transform:translateX(4px); }
  .rank-card.top1 { border-color:rgba(255,215,0,.3);background:linear-gradient(135deg,#16161f,#1a1810); }
  .rank-card.top2 { border-color:rgba(192,192,192,.2); }
  .rank-card.top3 { border-color:rgba(205,127,50,.2); }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .rank-num { font-family:'Bebas Neue',sans-serif;font-size:28px;min-width:40px;text-align:center;line-height:1; }
  .rank-card.top1 .rank-num { color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.4); }
  .rank-card.top2 .rank-num { color:var(--silver); }
  .rank-card.top3 .rank-num { color:var(--bronze); }
  .rank-card:not(.top1):not(.top2):not(.top3) .rank-num { color:var(--muted); }
  .thumb { width:80px;height:45px;border-radius:8px;object-fit:cover;flex-shrink:0; }
  .thumb-placeholder { width:80px;height:45px;border-radius:8px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px; }
  .info { flex:1;min-width:0; }
  .video-title { font-weight:700;font-size:14px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px; }
  .channel-name { font-size:12px;color:var(--muted); }
  .stats { display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0; }
  .view-count { font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);line-height:1; }
  .rank-card.top1 .view-count { color:var(--gold); }
  .view-label { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px; }
  .hours-ago { font-size:11px;color:var(--muted);padding:3px 8px;background:var(--surface);border-radius:20px; }
  .skeleton { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:10px;animation:shimmer 1.5s infinite; }
  @keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }
  .skel-num{width:40px;height:28px;background:var(--border);border-radius:4px}
  .skel-thumb{width:80px;height:45px;background:var(--border);border-radius:8px;flex-shrink:0}
  .skel-info{flex:1}.skel-line{height:12px;background:var(--border);border-radius:4px;margin-bottom:8px}
  .skel-line.short{width:40%}.skel-stats{width:60px}
  .skel-big{height:24px;background:var(--border);border-radius:4px;margin-bottom:6px}
  .skel-small{height:10px;width:30px;background:var(--border);border-radius:4px}
  .empty { text-align:center;padding:80px 20px;color:var(--muted);display:none; }
  .empty.visible { display:block; }
  .empty-icon { font-size:48px;margin-bottom:16px; }
  .empty h3 { font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:8px;color:var(--text); }
  .channel-count { display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);margin-bottom:16px; }
  footer { text-align:center;margin-top:48px;color:var(--muted);font-size:12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-bar">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="#ff2d55"/><path d="M14 11L26 18L14 25V11Z" fill="white"/></svg>
    </div>
    <h1>SHORTS LEADERBOARD</h1>
    <p class="subtitle">Son 24 saat • En çok izlenen 10 short</p>
  </header>

  <div class="error-msg" id="errorMsg"></div>

  <div class="status-bar">
    <div class="status-left"><div class="pulse"></div><span id="statusText">Hazır</span></div>
    <div id="lastUpdate" style="color:var(--muted);font-size:12px"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadLeaderboard()">
      <div class="spinner"></div><span>Yenile</span>
    </button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Kanallar taranıyor...</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <div class="channel-count"><span>📡</span><span>73 kanal takip ediliyor</span></div>

  <div id="skeletonList"></div>
  <div class="leaderboard" id="leaderboard"></div>
  <div class="empty" id="emptyState">
    <div class="empty-icon">📭</div>
    <h3>Short Bulunamadı</h3>
    <p>Son 24 saatte bu kanallardan short yayınlanmamış.</p>
  </div>

  <footer><p>Veriler web araması ile alınır • Her 30 dakikada otomatik güncellenir</p></footer>
</div>

<script>
const CHANNELS = [
  "EgitimciAdam","SnipZMemes","EzaXD09","zhiphyr","MemeDoggyZ","Moktalojik","ONLYMEMES-4YOU",
  "MiiRain","monium","CurtZmemes","PixelinuBlixMeme","Pezoid.x","Refahyolcusu","victor_rozz",
  "FirstlaughterDose","Devil_React","twosidememes","CrypticWorlds","gelnox","BloopTubeShorts",
  "OxygenosDuo","wafuuMrUnknownXD","GenZMems","DAL3X","NonGeek","Grin","PixelCompaly2",
  "iCloud.y","Zinng","Jolizo","menimemee","Mesosphere-92","Flaxtu","Ogigsy","Pfft_real",
  "GAMETIMENahomom","ZorbZorb","Memurk","XoreXEdit","itsmemetronix","BoruMemes","VazhYT",
  "Zohomemes","Mematus","TrigX_I","Zwaphr","Puzz.Y","JosephMemess","aspectmeme","WisdomVerse2",
  "KXHi","SkeldZ","japinoygamingghlights1","yt.meminho","VadeZmemes","Cyall","Zdak",
  "NikaDimension","RealBlastHaven","MrManZell","memessoo","vkomedipost","Zplunko","EzyCricu",
  "Goofarr","Karsilastirio","drixx3","Klypt.x","Techlin","JemsyMemes","ZyroMems","yaşayan.ölüyüm8"
];

let autoRefreshInterval = null;

function formatViews(n) {
  n = parseInt(n) || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function hoursAgo(dateStr) {
  if (!dateStr) return '';
  const diff = (Date.now() - new Date(dateStr)) / 1000 / 3600;
  if (diff < 1) return Math.round(diff*60) + 'dk önce';
  return Math.round(diff) + 'sa önce';
}

function showError(msg) { const e=document.getElementById('errorMsg'); e.textContent=msg; e.classList.add('visible'); }
function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
function setStatus(t) { document.getElementById('statusText').textContent = t; }
function setProgress(done, total, label) {
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressFill').style.width = Math.round((done/total)*100)+'%';
  if (done >= total) setTimeout(()=>document.getElementById('progressWrap').classList.remove('visible'), 1000);
}
function showSkeletons() {
  document.getElementById('skeletonList').innerHTML = Array(5).fill(0).map(()=>`
    <div class="skeleton"><div class="skel-num"></div><div class="skel-thumb"></div>
    <div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-stats"><div class="skel-big"></div><div class="skel-small"></div></div></div>`).join('');
}
function hideSkeletons() { document.getElementById('skeletonList').innerHTML = ''; }

async function fetchShortsForBatch(batch) {
  const list = batch.map(c => 'youtube.com/@'+c+'/shorts').join(', ');
  const prompt = `Today is ${new Date().toISOString().split('T')[0]}. Search YouTube for the most recent Shorts (last 24 hours) from these channels: ${batch.map(c=>'@'+c).join(', ')}.

For each channel that posted a Short today or yesterday, return its most viewed Short. Return ONLY a valid JSON array, no markdown, no explanation:
[{"channel":"@Name","title":"Video Title","videoId":"ABC123xyz","views":50000,"publishedAt":"2024-01-15T10:00:00Z"}]

Rules:
- videoId must be the real 11-char YouTube video ID
- views must be a realistic integer
- Only include channels that actually have a recent Short
- Return [] if none found`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${errText.slice(0,100)}`);
  }

  const data = await resp.json();
  const textBlock = data.content?.find(b => b.type === 'text');
  if (!textBlock?.text) return [];

  try {
    const match = textBlock.text.match(/\[[\s\S]*?\]/);
    if (!match) return [];
    const parsed = JSON.parse(match[0]);
    return Array.isArray(parsed) ? parsed.filter(v => v.videoId && v.title) : [];
  } catch { return []; }
}

async function loadLeaderboard() {
  hideError();
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.classList.add('loading');
  document.getElementById('leaderboard').innerHTML = '';
  document.getElementById('emptyState').classList.remove('visible');
  showSkeletons();
  setStatus('Taranıyor...');

  const allShorts = [];
  const batchSize = 10;
  const batches = [];
  for (let i = 0; i < CHANNELS.length; i += batchSize) batches.push(CHANNELS.slice(i, i+batchSize));

  try {
    for (let i = 0; i < batches.length; i++) {
      const done = i * batchSize;
      setProgress(done, CHANNELS.length, `Grup ${i+1}/${batches.length} taranıyor... (${done+1}–${Math.min(done+batchSize, CHANNELS.length)})`);
      setStatus(`${allShorts.length} short bulundu | Grup ${i+1}/${batches.length}`);
      try {
        const results = await fetchShortsForBatch(batches[i]);
        allShorts.push(...results);
      } catch(e) {
        console.warn('Batch', i, 'error:', e.message);
        if (i === 0) { showError('API hatası: ' + e.message); }
      }
      if (i < batches.length-1) await new Promise(r => setTimeout(r, 800));
    }

    setProgress(CHANNELS.length, CHANNELS.length, 'Tamamlandı');
    allShorts.sort((a,b) => (parseInt(b.views)||0)-(parseInt(a.views)||0));
    const top10 = allShorts.slice(0, 10);

    hideSkeletons();
    setStatus(`Güncellendi ✓ — ${allShorts.length} short bulundu`);
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('tr-TR');

    if (!top10.length) {
      document.getElementById('emptyState').classList.add('visible');
    } else {
      renderLeaderboard(top10);
    }

    clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(loadLeaderboard, 30*60*1000);

  } catch(e) {
    hideSkeletons();
    showError('Kritik hata: ' + e.message);
    setStatus('Hata');
  }

  btn.disabled = false; btn.classList.remove('loading');
}

function renderLeaderboard(items) {
  const rankClass = ['top1','top2','top3'];
  document.getElementById('leaderboard').innerHTML = items.map((item, idx) => {
    const vid = item.videoId || '';
    const thumb = vid ? `https://i.ytimg.com/vi/${vid}/mqdefault.jpg` : '';
    const url = vid ? `https://youtube.com/shorts/${vid}` : '#';
    return `<a class="rank-card ${rankClass[idx]||''}" href="${url}" target="_blank" style="animation-delay:${idx*60}ms">
      <div class="rank-num">${idx+1}</div>
      ${thumb ? `<img class="thumb" src="${thumb}" alt="" loading="lazy" onerror="this.outerHTML='<div class=thumb-placeholder>▶</div>'">` : '<div class="thumb-placeholder">▶</div>'}
      <div class="info">
        <div class="video-title">${esc(item.title||'')}</div>
        <div class="channel-name">${esc(item.channel||'')}</div>
      </div>
      <div class="stats">
        <div class="view-count">${formatViews(item.views)}</div>
        <div class="view-label">izlenme</div>
        ${item.publishedAt?`<div class="hours-ago">${hoursAgo(item.publishedAt)}</div>`:''}
      </div>
    </a>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.onload = () => loadLeaderboard();
</script>
</body>
</html>
